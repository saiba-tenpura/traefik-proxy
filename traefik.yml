global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  insecure: false
  dashboard: true

entrypoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: :443
    http:
      tls: true
      middlewares:
        - compression@file

certificatesResolvers:
  letsEncrypt:
    acme:
      email: <email address>
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web

# certificatesResolvers:
#   letsEncryptDns:
#     acme:
#       email: <EMAIL_ADDRESS>
#       storage: /etc/traefik/acme.json
#       dnsChallenge:
#         delayBeforeCheck: 0
#         provider: <ACME_PROVIDER>

providers:
  docker:
    exposedByDefault: false
    network: proxy-network
  file:
    directory: /etc/traefik/config

metrics:
  prometheus: {}
